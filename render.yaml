services:
  - type: web
    name: codebuddy-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health/ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
